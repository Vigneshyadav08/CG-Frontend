<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Form</title>
    <style>
        body {
        display: flex;
        justify-content: center;               
        }
    </style>
</head>
<body>
<fieldset style="width: max-content;">
<form>
    <table>
        <tr>
            <td>Name<b style="color: rgb(204, 9, 9);">*</b></td>
            <td><input type="text" required></td>
        </tr>

        <tr>
            <td>Address</td>
            <td><input type="text"></td>
        </tr>

        <tr>
            <td>Zip Code<b style="color: rgb(204, 9, 9);">*</b></td>
            <td>
                <input type="text" placeholder="enter a 5-digit code" maxlength="5" minlength="5" required>
            </td>
        </tr>

        <tr>
            <td>Country<b style="color: rgb(204, 9, 9);">*</b></td>
            <td>
                <select required>
                    <option value="" disabled selected>Please select...</option>
                    <option>India</option>
                    <option>USA</option>
                    <option>UK</option>
                </select>
            </td>
        </tr>

        <tr>
            <td>Gender<b style="color: rgb(204, 9, 9);">*</b></td>
            <td>
                <input type="radio" name="gender" required> Male
                <input type="radio" name="gender"> Female
            </td>
        </tr>

        <tr>
            <td>Preferences<b style="color: rgb(204, 9, 9);">*</b></td>
            <td>
                <input type="checkbox"> Red
                <input type="checkbox" checked> Green
                <input type="checkbox"> Blue
            </td>
        </tr>

        <tr>
            <td>Phone<b style="color: rgb(204, 9, 9);">*</b></td>
            <td>
                <input type="tel" maxlength="10" minlength="10" required>
            </td>
        </tr>

        <tr>
            <td>Email<b style="color: rgb(204, 9, 9);">*</b></td>
            <td><input type="email" required></td>
        </tr>

        <tr>
            <td>Password<b style="color: rgb(204, 9, 9);">*</b></td>
            <td>
                <input type="password" minlength="6" maxlength="8"
                placeholder="6-8 characters" required>
            </td>
        </tr>

        <tr>
            <td>Verify Password<b style="color: rgb(204, 9, 9);">*</b></td>
            <td><input type="password" required></td>
        </tr>

        <tr>
            <td>Birthday<b style="color: rgb(204, 9, 9);">*</b></td>
            <td><input type="date" required></td>
        </tr>

        <tr>
            <td>Appointment<b style="color: rgb(204, 9, 9);">*</b></td>
            <td><input type="time" required></td>
        </tr>

        <tr>
            <td></td>
            <td>
                <input type="submit" value="SEND">
                <input type="reset" value="CLEAR">
            </td>
        </tr>
    </table>
</form>
</fieldset>
</body>
</html>
